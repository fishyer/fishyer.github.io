  <!-- 定义加载时的显示 -->
  <div id="app">很快！等我一下！</div>
  <script>
    window.$docsify = {
      themeColor: '#76becc',
      // repo: 'https://github.com/fishyer',
      name: "Fishyer-PKM",
      // 需要封面页面
      coverpage: "_coverpage.md",
      // 侧边栏文档目录
      loadSidebar: true,
      loadNavbar: "_navbar.md",
      // 因为有右侧文章内部目录，所以左侧的文件目录这里就不显示内部目录了
      subMaxLevel: 0,
      alias: {
        "/.*/_sidebar.md": "/_sidebar.md",
      },
      // 跳转后自动到顶部。打开以后会跳到封面顶部，有点问题
      // auto2top: true,
      // ------------------------------[PLUGINS]----------------------------------
      // 页面右侧toc
      toc: {
        tocMaxLevel: 2,
        target: "h2, h3, h4, h5, h6",
      },
      // 底部导航
      pagination: {
        previousText: "上一页",
        nextText: "下一页",
        crossChapter: true,
        crossChapterText: true,
      },
      // 字数统计
      count: {
        countable: true,
        position: "top",
        margin: "10px",
        float: "right",
        fontsize: "0.9em",
        color:'rgb(90,90,90)',
        language: "chinese",
        localization: {
          words: "",
          minute: "",
        },
        isExpected: true,
      },
            // 全文搜索
      search: {
        paths: 'auto',
        placeholder: '🔍 搜索',
        noData: '😒 找不到结果',
        // Headline depth, 1 - 6
        depth: 6,
        maxAge: 86400000, // 过期时间，单位毫秒，默认一天
        placeholder: "搜索...",
        // 避免搜索索引冲突,同一域下的多个网站之间
        namespace: "website-1",
      },
    };

  </script>
  <!-- docsify -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- 代码高亮  https://cdn.jsdelivr.net/npm/prismjs@1/components/ -->

  <!-- 侧边栏目录折叠 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>

  <!-- 页面右侧 TOC -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-plugin-toc@1.1.0/dist/docsify-plugin-toc.min.js"></script>
